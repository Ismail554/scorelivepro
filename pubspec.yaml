name: scorelivepro
description: "A new Flutter project."
# The following line prevents accidental publishing to pub.dev:
publish_to: 'none'

version: 1.0.0+1

environment:
  # Adjusted to a standard and correct Dart SDK version for a modern Flutter project.
  # The '^3.10.3' from your original file is likely meant to be a range like '>=3.0.0 <4.0.0' or specific to the Flutter SDK version you are using.
  # Assuming you are using a recent stable Flutter version:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Dependencies
  cupertino_icons: ^1.0.8 
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.3.2
  flutter_svg: ^2.0.10 # Reverted to a more common major version for stability
  flutter_secure_storage: ^10.0.0
  pinput: ^6.0.0
  flutter_staggered_grid_view: ^0.7.0
  cached_network_image: ^3.3.1
  provider: ^6.1.1
  image_picker: ^1.1.2
  textfield_tags: ^3.0.1
  flutter_launcher_icons: ^0.14.2
  lottie: ^3.3.2
  shared_preferences: ^2.2.2
  easy_localization: ^3.0.8
  timezone: ^0.10.1
  dio: ^5.9.0
  uuid: ^4.5.2
  web_socket_channel: ^3.0.3
  marquee: ^2.3.0
  intl: any
  change_app_package_name: ^1.5.0
  shimmer: ^3.0.0
  google_sign_in: ^7.2.0
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  flutter_localizations:
    sdk: flutter
  google_mobile_ads: ^7.0.0


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 21 

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Indentation corrected
  flutter_lints: ^6.0.0 # Reverted to a common major version for stability

# The following section is for Flutter-specific configuration
flutter:
  generate: true

  # The property 'uses-material-design' must be directly under 'flutter:'
  # and its value is a boolean (true/false)
  uses-material-design: true

  # Assets must be indented correctly under 'flutter:'
  assets:
    - assets/images/
    - assets/icons/
    - assets/svg/
    - assets/translations/
 

  # To add custom fonts to your application, add a fonts section here:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700